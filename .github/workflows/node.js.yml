// CAMADA DE LOGICA DE NEGOCIO (Business Logic)
// ============================================================

const XP_PER_LEVEL = 6000;

const ProgressService = {
  calculateLevel(xp) {
    return Math.floor(xp / XP_PER_LEVEL) + 1;
  },

  calculateLevelProgress(xp) {
    const level = this.calculateLevel(xp);
    const currentLevelXp = (level - 1) * XP_PER_LEVEL;
    const nextLevelXp = level * XP_PER_LEVEL;
    const progress = ((xp - currentLevelXp) / (nextLevelXp - currentLevelXp)) * 100;
    return { level, progress: Math.min(100, Math.max(0, progress)), current: xp - currentLevelXp, target: XP_PER_LEVEL };
  },

  getLevelName(level) {
    const xp = (level - 1) * XP_PER_LEVEL;
    for (let i = LEVEL_MAP.length - 1; i >= 0; i--) {
      if (xp >= LEVEL_MAP[i].minXp) {
        return LEVEL_MAP[i];
      }
    }
    return LEVEL_MAP[0];
  },

  getNextLevelName(level) {
    const xp = (level - 1) * XP_PER_LEVEL;
    for (let i = 0; i < LEVEL_MAP.length; i++) {
      if (xp < LEVEL_MAP[i].minXp) {
        return LEVEL_MAP[i];
      }
    }
    return LEVEL_MAP[LEVEL_MAP.length - 1];
  },

  addXp(currentXp, amount) {
    const newXp = currentXp + amount;
    const oldLevel = this.calculateLevel(currentXp);
    const newLevel = this.calculateLevel(newXp);
    const leveledUp = newLevel > oldLevel;
    return { newXp, newLevel, leveledUp, oldLevel };
  },

  checkAchievements(habits, xp, level, unlocked = []) {
    const newAchievements = [];
    const isUnlocked = (id) => unlocked.includes(id);

    const totalCompleted = habits.reduce((sum, h) => sum + (h.history?.filter((d) => d.done).length || 0), 0);
    const maxStreak = Math.max(...habits.map((h) => h.bestStreak || 0), 0);
    const waterStreak = habits.find((h) => h.id === "agua")?.bestStreak || 0;
    const workoutCount = habits.find((h) => h.id === "treino")?.history?.filter((d) => d.done).length || 0;
    const readingStreak = habits.find((h) => h.id === "leitura")?.bestStreak || 0;
    const allDoneToday = habits.every((h) => h.done);

    if (totalCompleted >= 1 && !isUnlocked("first_habit")) newAchievements.push("first_habit");
    if (maxStreak >= 7 && !isUnlocked("week_streak")) newAchievements.push("week_streak");
    if (maxStreak >= 30 && !isUnlocked("month_streak")) newAchievements.push("month_streak");
    if (maxStreak >= 100 && !isUnlocked("century_streak")) newAchievements.push("century_streak");
    if (waterStreak >= 30 && !isUnlocked("water_master")) newAchievements.push("water_master");
    if (workoutCount >= 50 && !isUnlocked("workout_warrior")) newAchievements.push("workout_warrior");
    if (readingStreak >= 30 && !isUnlocked("bookworm")) newAchievements.push("bookworm");
    if (allDoneToday && !isUnlocked("perfectionist")) newAchievements.push("perfectionist");
    if (level >= 10 && !isUnlocked("level_10")) newAchievements.push("level_10");
    if (level >= 25 && !isUnlocked("level_25")) newAchievements.push("level_25");
    if (level >= 50 && !isUnlocked("level_50")) newAchievements.push("level_50");

    return newAchievements;
  },

  generateDailyMissions(habits, user) {
    const missions = [];
    const incomplete = habits.filter((h) => !h.done);

    if (incomplete.find((h) => h.id === "agua")) {
      missions.push({ id: "agua", icon: "Droplet", label: "Agua", desc: "Beba 2L de agua hoje", xp: 20 });
    }
    if (incomplete.find((h) => h.id === "sono")) {
      missions.push({ id: "sono", icon: "Moon", label: "Sono", desc: "Durma pelo menos 7h30", xp: 30 });
    }
    if (incomplete.find((h) => h.id === "treino")) {
      missions.push({ id: "treino", icon: "Dumbbell", label: "Treino", desc: "30 min de atividade fisica", xp: 100 });
    }
    if (incomplete.find((h) => h.id === "leitura")) {
      missions.push({ id: "leitura", icon: "BookOpen", label: "Leitura", desc: "Leia 10 paginas", xp: 40 });
    }
    if (incomplete.find((h) => h.id === "meditacao")) {
      missions.push({ id: "meditacao", icon: "Brain", label: "Meditacao", desc: "10 min de foco", xp: 30 });
    }
    if (incomplete.find((h) => h.id === "alimentacao")) {
      missions.push({ id: "alimentacao", icon: "Utensils", label: "Alimentacao", desc: "3 refeicoes balanceadas", xp: 60 });
    }

    return missions.slice(0, 4);
  },

  generateCoachMessage(habits, user, streak, level) {
    const completed = habits.filter((h) => h.done).length;
    const total = habits.length;
    const incomplete = habits.filter((h) => !h.done);

    const hour = new Date().getHours();
    let greeting = "Bom dia";
    if (hour >= 12 && hour < 18) greeting = "Boa tarde";
    else if (hour >= 18) greeting = "Boa noite";

    const messages = [];
    messages.push(`${greeting}, ${user.name || "guerreiro"}.`);

    if (streak > 0) {
      messages.push(`Voce esta ha ${streak} dias em sequencia. Impressionante!`);
    }

    if (completed === total) {
      messages.push("Voce completou todos os habitos hoje! Sua constancia e inspiradora.");
    } else if (completed > 0) {
      messages.push(`Voce completou ${completed} de ${total} habitos. Falta pouco para fechar o dia!`);
      if (incomplete.length > 0) {
        messages.push(`Sua proxima missao: ${incomplete[0].label}.`);
      }
    } else {
      messages.push("Hoje e um novo dia para evoluir. Vamos comecar com uma pequena vitoria?");
    }

    if (level >= 10) {
      messages.push(`Voce esta no nivel ${level}. Sua evolucao e visivel!`);
    }

    return messages;
  },

  getSleepQuality(hours) {
    if (hours >= 8) return { quality: "excelente", color: GREEN, message: "Sono excelente! Seu corpo agradece." };
    if (hours >= 7) return { quality: "bom", color: "#22C55E", message: "Bom sono. Mantenha essa constancia." };
    if (hours >= 6) return { quality: "regular", color: WARNING, message: "Sono regular. Tente dormir mais cedo hoje." };
    return { quality: "insuficiente", color: ERROR, message: "Sono insuficiente. Priorize o descanso hoje." };
  },
};


