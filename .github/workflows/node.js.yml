function AppProvider({ children }) {
  const [user, setUser] = useState(() => StorageService.get(STORAGE_KEYS.USER, DEFAULT_USER));
  const [habits, setHabits] = useState(() => StorageService.get(STORAGE_KEYS.HABITS, DEFAULT_HABITS));
  const [settings, setSettings] = useState(() => StorageService.get(STORAGE_KEYS.SETTINGS, DEFAULT_SETTINGS));
  const [xp, setXp] = useState(() => StorageService.get(STORAGE_KEYS.XP, 0));
  const [streak, setStreak] = useState(() => StorageService.get(STORAGE_KEYS.STREAK, 0));
  const [maxStreak, setMaxStreak] = useState(() => StorageService.get(STORAGE_KEYS.MAX_STREAK, 0));
  const [achievements, setAchievements] = useState(() => StorageService.get(STORAGE_KEYS.ACHIEVEMENTS, []));
  const [meals, setMeals] = useState(() => StorageService.get(STORAGE_KEYS.MEALS, DEFAULT_MEALS));
  const [messages, setMessages] = useState(() => StorageService.get(STORAGE_KEYS.MESSAGES, []));
  const [dailyMissions, setDailyMissions] = useState(() => StorageService.get(STORAGE_KEYS.DAILY_MISSIONS, []));
  const [lastOpenDate, setLastOpenDate] = useState(() => StorageService.get(STORAGE_KEYS.LAST_OPEN_DATE, null));
  const [isOnline, setIsOnline] = useState(typeof navigator !== "undefined" ? navigator.onLine : true);
  const [toast, setToast] = useState(null);
  const [isLoading, setIsLoading] = useState(false);

  const t = useCallback((key) => {
    const lang = settings.language || "pt";
    return LANGUAGES[lang]?.[key] || LANGUAGES.pt[key] || key;
  }, [settings.language]);

  // Persistencia automatica
  useEffect(() => { StorageService.set(STORAGE_KEYS.USER, user); }, [user]);
  useEffect(() => { StorageService.set(STORAGE_KEYS.HABITS, habits); }, [habits]);
  useEffect(() => { StorageService.set(STORAGE_KEYS.SETTINGS, settings); }, [settings]);
  useEffect(() => { StorageService.set(STORAGE_KEYS.XP, xp); }, [xp]);
  useEffect(() => { StorageService.set(STORAGE_KEYS.STREAK, streak); }, [streak]);
  useEffect(() => { StorageService.set(STORAGE_KEYS.MAX_STREAK, maxStreak); }, [maxStreak]);
  useEffect(() => { StorageService.set(STORAGE_KEYS.ACHIEVEMENTS, achievements); }, [achievements]);
  useEffect(() => { StorageService.set(STORAGE_KEYS.MEALS, meals); }, [meals]);
  useEffect(() => { StorageService.set(STORAGE_KEYS.MESSAGES, messages); }, [messages]);
  useEffect(() => { StorageService.set(STORAGE_KEYS.DAILY_MISSIONS, dailyMissions); }, [dailyMissions]);
  useEffect(() => { StorageService.set(STORAGE_KEYS.LAST_OPEN_DATE, lastOpenDate); }, [lastOpenDate]);

  // Monitoramento de conexao
  useEffect(() => {
    const handleOnline = () => setIsOnline(true);
    const handleOffline = () => setIsOnline(false);
    window.addEventListener("online", handleOnline);
    window.addEventListener("offline", handleOffline);
    return () => {
      window.removeEventListener("online", handleOnline);
      window.removeEventListener("offline", handleOffline);
    };
  }, []);

  // Toast helper
  const showToast = useCallback((message, type = "info", duration = 3000) => {
    setToast({ message, type });
    setTimeout(() => setToast(null), duration);
  }, []);

  // Toggle habit
  const toggleHabit = useCallback((id) => {
    setHabits((prev) => {
      const today = new Date().toISOString().split("T")[0];
      return prev.map((h) => {
        if (h.id !== id) return h;
        const newDone = !h.done;
        const newHistory = [...(h.history || [])];
        const todayEntry = newHistory.find((entry) => entry.date === today);
        if (todayEntry) {
          todayEntry.done = newDone;
        } else {
          newHistory.push({ date: today, done: newDone });
        }
        const trimmedHistory = newHistory.slice(-90);

        let currentStreak = 0;
        for (let i = trimmedHistory.length - 1; i >= 0; i--) {
          if (trimmedHistory[i].done) currentStreak++;
          else break;
        }

        return {
          ...h,
          done: newDone,
          history: trimmedHistory,
          streak: currentStreak,
          bestStreak: Math.max(currentStreak, h.bestStreak || 0),
        };
      });
    });

    setHabits((prev) => {
      const habit = prev.find((h) => h.id === id);
      if (habit && habit.done) {
        const result = ProgressService.addXp(xp, habit.xp);
        setXp(result.newXp);
        if (result.leveledUp) {
          showToast(`Nivel ${result.newLevel}!`, "success", 5000);
        }
      }
      return prev;
    });
  }, [xp, showToast]);

  // Toggle meal
  const toggleMeal = useCallback((id) => {
    setMeals((prev) => prev.map((m) => m.id === id ? { ...m, done: !m.done } : m));
  }, []);

  // Reset daily habits
  const resetDailyHabits = useCallback(() => {
    const today = new Date().toISOString().split("T")[0];
    setHabits((prev) => prev.map((h) => ({ ...h, done: false })));
    setMeals((prev) => prev.map((m) => ({ ...m, done: false })));
    setLastOpenDate(today);

    const newMissions = ProgressService.generateDailyMissions(
      habits.map((h) => ({ ...h, done: false })),
      user
    );
    setDailyMissions(newMissions);
  }, [habits, user]);

  // Check day change
  useEffect(() => {
    const today = new Date().toISOString().split("T")[0];
    if (lastOpenDate && lastOpenDate !== today) {
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      const yesterdayStr = yesterday.toISOString().split("T")[0];

      const allDoneYesterday = habits.every((h) => {
        const entry = h.history?.find((e) => e.date === yesterdayStr);
        return entry?.done;
      });

      if (!allDoneYesterday && lastOpenDate !== yesterdayStr) {
        setStreak(0);
        showToast(t("streak") + " resetada. Volte forte hoje!", "warning");
      } else if (allDoneYesterday) {
        setStreak((s) => {
          const newStreak = s + 1;
          setMaxStreak((m) => Math.max(m, newStreak));
          return newStreak;
        });
      }

      resetDailyHabits();
    } else if (!lastOpenDate) {
      setLastOpenDate(today);
    }
  }, [lastOpenDate, habits, resetDailyHabits, showToast, t]);

  // Check achievements
  useEffect(() => {
    const level = ProgressService.calculateLevel(xp);
    const newAchievements = ProgressService.checkAchievements(habits, xp, level, achievements);
    if (newAchievements.length > 0) {
      setAchievements((prev) => [...prev, ...newAchievements]);
      newAchievements.forEach((id) => {
        const ach = ACHIEVEMENTS.find((a) => a.id === id);
        if (ach) {
          showToast(`${ach.title}! +${ach.xp} XP`, "success", 4000);
          if (ach.xp > 0) {
            const result = ProgressService.addXp(xp, ach.xp);
            setXp(result.newXp);
          }
        }
      });
    }
  }, [habits, xp, achievements, showToast]);

  // Backup
  const createBackup = useCallback(() => {
    const data = StorageService.exportAll();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `vidaforte_backup_${new Date().toISOString().split("T")[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast(t("backupCreated"), "success");
  }, [showToast, t]);

  const restoreBackup = useCallback((file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (StorageService.importAll(data)) {
          setUser(StorageService.get(STORAGE_KEYS.USER, DEFAULT_USER));
          setHabits(StorageService.get(STORAGE_KEYS.HABITS, DEFAULT_HABITS));
          setSettings(StorageService.get(STORAGE_KEYS.SETTINGS, DEFAULT_SETTINGS));
          setXp(StorageService.get(STORAGE_KEYS.XP, 0));
          setStreak(StorageService.get(STORAGE_KEYS.STREAK, 0));
          setMaxStreak(StorageService.get(STORAGE_KEYS.MAX_STREAK, 0));
          setAchievements(StorageService.get(STORAGE_KEYS.ACHIEVEMENTS, []));
          setMeals(StorageService.get(STORAGE_KEYS.MEALS, DEFAULT_MEALS));
          setMessages(StorageService.get(STORAGE_KEYS.MESSAGES, []));
          showToast(t("backupRestored"), "success");
        }
      } catch {
        showToast("Erro ao restaurar backup", "error");
      }
    };
    reader.readAsText(file);
  }, [showToast, t]);

  // Delete account
  const deleteAccount = useCallback(() => {
    StorageService.clear();
    setUser(DEFAULT_USER);
    setHabits(DEFAULT_HABITS);
    setSettings(DEFAULT_SETTINGS);
    setXp(0);
    setStreak(0);
    setMaxStreak(0);
    setAchievements([]);
    setMeals(DEFAULT_MEALS);
    setMessages([]);
    setDailyMissions([]);
    showToast("Conta excluida com sucesso", "success");
  }, [showToast]);

  const levelInfo = ProgressService.calculateLevelProgress(xp);
  const levelName = ProgressService.getLevelName(levelInfo.level);

  const value = {
    user, setUser,
    habits, setHabits, toggleHabit,
    settings, setSettings,
    xp, setXp,
    streak, setStreak,
    maxStreak, setMaxStreak,
    achievements, setAchievements,
    meals, setMeals, toggleMeal,
    messages, setMessages,
    dailyMissions, setDailyMissions,
    lastOpenDate, setLastOpenDate,
    isOnline,
    toast, showToast,
    isLoading, setIsLoading,
    t,
    levelInfo,
    levelName,
    createBackup,
    restoreBackup,
    deleteAccount,
    resetDailyHabits,
    StorageService,
  };

  return (
    <AppContext.Provider value={value}>
      {children}
      <Toast toast={toast} />
      {!isOnline && <OfflineBanner t={t} />}
    </AppContext.Provider>
  );
}

function useApp() {
  const context = useContext(AppContext);
  if (!context) throw new Error("useApp must be used within AppProvider");
  return context;
}

// ============================================================
// COMPONENTES DE UI REUTILIZAVEIS
// ============================================================

const Toast = memo(function Toast({ toast }) {
  if (!toast) return null;
  const colors = {
    success: { bg: "#166534", border: "#22C55E" },
    error: { bg: "#7F1D1D", border: "#E5484D" },
    warning: { bg: "#713F12", border: "#F59E0B" },
    info: { bg: CARD, border: BORDER },
  };
  const c = colors[toast.type] || colors.info;
  return (
    <div className="fixed top-4 left-1/2 -translate-x-1/2 z-50 px-4 py-3 rounded-xl text-[13px] font-medium text-white shadow-lg"
      style={{ background: c.bg, border: `1px solid ${c.border}`, maxWidth: "90%", textAlign: "center", animation: "fadeIn 0.3s ease" }}>
      {toast.message}
    </div>
  );
});

const OfflineBanner = memo(function OfflineBanner({ t }) {
  return (
    <div className="fixed top-0 left-0 right-0 z-50 flex items-center justify-center gap-2 py-1.5 text-[11px] font-medium"
      style={{ background: "#713F12", color: "#FEF3C7" }}>
      <WifiOff size={12} /> {t("noConnection")}
    </div>
  );
});

function VLogo({ size = 30 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 100 100">
      <defs>
        <linearGradient id="vfGradA" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stopColor="#BFF0A0" />
          <stop offset="55%" stopColor="#39C463" />
          <stop offset="100%" stopColor="#0F5C33" />
        </linearGradient>
        <linearGradient id="vfGradB" x1="0%" y1="100%" x2="100%" y2="0%">
          <stop offset="0%" stopColor="#0B4026" />
          <stop offset="60%" stopColor="#2E9A52" />
          <stop offset="100%" stopColor="#8CE68F" />
        </linearGradient>
      </defs>
      <path d="M8 12 L38 12 L58 58 L48 82 Z" fill="url(#vfGradB)" />
      <path d="M92 12 L62 12 L42 58 L52 82 Z" fill="url(#vfGradA)" />
      <path d="M38 12 L58 58 L50 45 Z" fill="#ffffff" opacity="0.18" />
    </svg>
  );
}

function AvatarCircle({ size = 40, iconSize = 18, image = null, gender = null }) {
  const getGradient = () => {
    if (gender === "male") return "linear-gradient(160deg,#1a2a30,#0a100c)";
    if (gender === "female") return "linear-gradient(160deg,#2a1a20,#0a100c)";
    return "linear-gradient(160deg,#1a2a20,#0a100c)";
  };

  return (
    <div
      className="rounded-full flex items-center justify-center border-2 shrink-0 overflow-hidden"
      style={{
        width: size,
        height: size,
        borderColor: GREEN,
        background: getGradient(),
      }}
    >
      {image ? (
        <img src={image} alt="Avatar" className="w-full h-full object-cover" />
      ) : (
        <User size={iconSize} color={GREEN} strokeWidth={1.4} />
      )}
    </div>
  );
}

function BigButton({ label = "Continuar", onClick, disabled, icon = ArrowRight }) {
  const Icon = icon;
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      className="w-full py-3.5 rounded-xl font-bold text-[14px] flex items-center justify-center gap-2 transition-all"
      style={{ 
        background: `linear-gradient(90deg,${GREEN},#22C55E)`, 
        color: "#04140A", 
        opacity: disabled ? 0.35 : 1,
        cursor: disabled ? "not-allowed" : "pointer",
      }}
    >
      {label} <Icon size={16} />
    </button>
  );
}

function Dots({ total, active }) {
  return (
    <div className="flex gap-1.5 justify-center pt-5 pb-1">
      {Array.from({ length: total }).map((_, i) => (
        <div
          key={i}
          className="h-1 rounded-full transition-all duration-300"
          style={{ width: i === active ? 22 : 8, background: i <= active ? GREEN : BORDER }}
        />
      ))}
    </div>
  );
}

function Card({ children, className = "", style = {} }) {
  return (
    <div className={`rounded-2xl p-4 ${className}`} style={{ background: CARD, border: `1px solid ${BORDER}`, ...style }}>
      {children}
    </div>
  );
}

function SectionTitle({ children, className = "" }) {
  return <p className={`text-white text-[13px] font-semibold mb-2.5 ${className}`}>{children}</p>;
}

function ProgressBar({ value, max = 100, color = GREEN, height = 8, className = "" }) {
  const pct = Math.min(100, Math.max(0, (value / max) * 100));
  return (
    <div className={`rounded-full overflow-hidden ${className}`} style={{ height, background: CARD }}>
      <div className="h-full rounded-full transition-all duration-500" style={{ width: `${pct}%`, background: color }} />
    </div>
  );
}

function IconBox({ icon: Icon, size = 16, bg = `${GREEN}22`, color = GREEN }) {
  return (
    <div className="w-9 h-9 rounded-lg flex items-center justify-center shrink-0" style={{ background: bg }}>
      <Icon size={size} color={color} />
    </div>
  );
}

function EmptyState({ icon: Icon, title, description }) {
  return (
    <div className="flex flex-col items-center justify-center py-10 text-center">
      <Icon size={40} color={DIM} className="mb-3" />
      <p className="text-white text-[14px] font-medium mb-1">{title}</p>
      <p className="text-[12px]" style={{ color: MUTED }}>{description}</p>
    </div>
  );
}

function LoadingSpinner({ size = 24 }) {
  return (
    <div className="flex items-center justify-center py-8">
      <RefreshCw size={size} color={GREEN} className="animate-spin" />
    </div>
  );
}

function ConfirmDialog({ isOpen, title, message, onConfirm, onCancel, confirmText = "Confirmar", cancelText = "Cancelar" }) {
  if (!isOpen) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: "rgba(0,0,0,0.8)" }}>
      <div className="rounded-2xl p-5 w-full max-w-sm" style={{ background: CARD, border: `1px solid ${BORDER}` }}>
        <div className="flex items-center gap-2 mb-3">
          <AlertTriangle size={18} color={WARNING} />
          <p className="text-white text-[15px] font-bold">{title}</p>
        </div>
        <p className="text-[13px] mb-5" style={{ color: MUTED }}>{message}</p>
        <div className="flex gap-2">
          <button onClick={onCancel} className="flex-1 py-2.5 rounded-xl text-[13px] font-medium" style={{ background: BORDER, color: MUTED }}>
            {cancelText}
          </button>
          <button onClick={onConfirm} className="flex-1 py-2.5 rounded-xl text-[13px] font-bold" style={{ background: ERROR, color: "white" }}>
            {confirmText}
          </button>
        </div>
      </div>
    </div>
  );
}

function LevelMap({ level, levelName }) {
  const levels = LEVEL_MAP;
  const currentIndex = levels.findIndex((l) => l.name === levelName.name);

  return (
    <div className="flex flex-col items-center py-4">
      <div className="relative flex flex-col items-center gap-1">
        {levels.map((l, i) => {
          const isActive = i <= currentIndex;
          const isCurrent = i === currentIndex;
          return (
            <div key={l.name} className="flex items-center gap-3">
              <div className={`w-8 h-8 rounded-full flex items-center justify-center text-[11px] font-bold border-2 transition-all ${isCurrent ? 'animate-pulse' : ''}`}
                style={{
                  background: isActive ? l.color : CARD,
                  borderColor: isActive ? l.color : BORDER,
                  color: isActive ? "#04140A" : DIM,
                  boxShadow: isCurrent ? `0 0 12px ${l.color}44` : "none",
                }}>
                {i + 1}
              </div>
              <div className="flex flex-col">
                <span className="text-[12px] font-semibold" style={{ color: isActive ? l.color : DIM }}>{l.label}</span>
                {isCurrent && <span className="text-[10px]" style={{ color: MUTED }}>Voce esta aqui</span>}
              </div>
              {i < levels.length - 1 && (
                <div className="absolute left-4 top-8 w-0.5 h-6" style={{ background: isActive ? l.color : BORDER }} />
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}


