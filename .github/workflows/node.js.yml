// ---------- CHAT / CALL ----------

const INITIAL_MESSAGES = [
  { from: "helena", text: "Bom dia! Vi que voce dormiu bem essa noite. Pronto para mais um dia de evolucao?" },
  { from: "helena", text: "Lembre-se: pequenas acoes diarias constroem grandes transformacoes." },
];
const QUICK_REPLIES = ["Como esta meu Indice essa semana?", "Me da uma missao para hoje", "Nao consegui treinar hoje"];

function ChatScreen({ onBack, onCall }) {
  const { messages, setMessages, user } = useApp();
  const [input, setInput] = useState("");
  const messagesEndRef = useRef(null);

  const scrollToBottom = () => {
    messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
  };

  useEffect(() => {
    scrollToBottom();
  }, [messages]);

  const send = (text) => {
    const t = text ?? input;
    if (!t.trim()) return;
    setMessages((m) => [...m, { from: "user", text: t, time: new Date().toISOString() }]);
    setInput("");
    setTimeout(() => {
      const responses = [
        "Entendi. Vou levar isso em conta no seu plano — voce nao esta sozinho nessa.",
        "Otima observacao! Vou ajustar suas metas para refletir isso.",
        "Continue assim! Cada passo conta na sua jornada.",
        "Lembre-se: a consistencia e mais importante que a perfeicao.",
      ];
      const randomResponse = responses[Math.floor(Math.random() * responses.length)];
      setMessages((m) => [...m, { from: "helena", text: randomResponse, time: new Date().toISOString() }]);
    }, 900);
  };

  return (
    <div className="flex-1 flex flex-col">
      <div className="flex items-center gap-3 px-5 pt-5 pb-4 border-b" style={{ borderColor: BORDER }}>
        <button onClick={onBack}><ArrowLeft size={18} color={MUTED} /></button>
        <AvatarCircle size={36} iconSize={16} image={user.avatar} gender={user.gender} />
        <div className="flex-1">
          <p className="text-white text-[13px] font-semibold">Dra. Helena</p>
          <p className="text-[10.5px]" style={{ color: GREEN }}>● sua mentora, sempre por perto</p>
        </div>
        <button onClick={onCall} className="w-9 h-9 rounded-full flex items-center justify-center" style={{ background: `${GREEN}22` }}>
          <Phone size={15} color={GREEN} />
        </button>
      </div>
      <div className="flex-1 overflow-y-auto px-4 pt-4 pb-2">
        {messages.length === 0 ? (
          <EmptyState icon={MessageCircle} title="Inicie uma conversa" description="Fale com a Dra. Helena sobre seus habitos e evolucao" />
        ) : (
          messages.map((m, i) => {
            const isHelena = m.from === "helena";
            return (
              <div key={i} className={`flex ${isHelena ? "justify-start" : "justify-end"} mb-3`}>
                {isHelena && <div className="mr-2"><AvatarCircle size={28} iconSize={13} /></div>}
                <div className="max-w-[75%] px-3.5 py-2.5 rounded-2xl text-[13px] leading-snug"
                  style={{ background: isHelena ? CARD : GREEN, color: isHelena ? "#F5FFF8" : "#04140A",
                    border: isHelena ? `1px solid ${BORDER}` : "none",
                    borderTopLeftRadius: isHelena ? 4 : 16, borderTopRightRadius: isHelena ? 16 : 4 }}>
                  {m.text}
                </div>
              </div>
            );
          })
        )}
        <div ref={messagesEndRef} />
      </div>
      <div className="flex gap-2 px-4 pb-3 overflow-x-auto">
        {QUICK_REPLIES.map((q) => (
          <button key={q} onClick={() => send(q)} className="shrink-0 text-[11px] rounded-full px-3 py-1.5 whitespace-nowrap" style={{ color: GREEN, border: `1px solid ${GREEN}55` }}>{q}</button>
        ))}
      </div>
      <div className="flex items-center gap-2 px-4 pb-5">
        <button onClick={onCall} className="w-10 h-10 rounded-full flex items-center justify-center shrink-0" style={{ background: CARD, border: `1px solid ${BORDER}` }}>
          <Mic size={16} color={MUTED} />
        </button>
        <input value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === "Enter" && send()}
          placeholder="Fale com a Dra. Helena..." className="flex-1 rounded-full px-4 py-2.5 text-[13px] text-white outline-none"
          style={{ background: CARD, border: `1px solid ${BORDER}` }} />
        <button onClick={() => send()} className="w-10 h-10 rounded-full flex items-center justify-center shrink-0" style={{ background: `linear-gradient(160deg,#7CFFA0,${"#22C55E"})` }}>
          <Send size={15} color="#04140A" />
        </button>
      </div>
    </div>
  );
}

function CallScreen({ onEnd }) {
  const [muted, setMuted] = useState(false);
  const [timer, setTimer] = useState(0);

  useEffect(() => {
    const interval = setInterval(() => setTimer((t) => t + 1), 1000);
    return () => clearInterval(interval);
  }, []);

  const formatTime = (s) => {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${m.toString().padStart(2, "0")}:${sec.toString().padStart(2, "0")}`;
  };

  return (
    <div className="flex-1 flex flex-col items-center justify-between py-10 px-8">
      <div className="text-center">
        <p className="text-[11px] tracking-widest font-semibold mb-1" style={{ color: GREEN }}>CHAMADA DE VOZ</p>
        <p className="text-white text-lg font-bold">Dra. Helena</p>
        <p className="text-[12px] mt-1" style={{ color: MUTED }}>{formatTime(timer)}</p>
      </div>
      <div className="relative flex items-center justify-center">
        <div className="absolute w-56 h-56 rounded-full animate-pulse" style={{ background: `radial-gradient(circle, ${GREEN}4D 0%, transparent 70%)` }} />
        <AvatarCircle size={144} iconSize={52} />
      </div>
      <div className="text-center px-2">
        <p className="text-[13.5px] leading-snug" style={{ color: "#D7E5DC" }}>
          "Percebi que voce chamou por voz — isso costuma acontecer quando voce precisa de um empurrao. Estou ouvindo."
        </p>
      </div>
      <div className="flex items-center gap-5">
        <button onClick={() => setMuted((m) => !m)} className="w-12 h-12 rounded-full flex items-center justify-center border"
          style={{ background: muted ? GREEN : CARD, borderColor: BORDER }}>
          {muted ? <MicOff size={18} color="#04140A" /> : <Mic size={18} color={MUTED} />}
        </button>
        <button onClick={onEnd} className="w-14 h-14 rounded-full flex items-center justify-center" style={{ background: "#E5484D" }}>
          <PhoneOff size={20} color="white" />
        </button>
        <div className="w-12" />
      </div>
    </div>
  );
}

