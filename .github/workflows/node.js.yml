function SettingsScreen({ onBack, onOpenAbout, onOpenManifesto }) {
  const { settings, setSettings, user, setUser, t, createBackup, restoreBackup, deleteAccount, showToast, StorageService } = useApp();
  const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
  const [showPinSetup, setShowPinSetup] = useState(false);
  const [pin, setPin] = useState("");
  const fileInputRef = useRef(null);

  const handleLanguageChange = (lang) => {
    setSettings((s) => ({ ...s, language: lang }));
    showToast("Idioma alterado!", "success");
  };

  const handlePinSetup = () => {
    if (pin.length === 4) {
      setSettings((s) => ({ ...s, pinLock: true, pin }));
      setShowPinSetup(false);
      setPin("");
      showToast("PIN configurado!", "success");
    }
  };

  const handleFileSelect = (e) => {
    const file = e.target.files?.[0];
    if (file) restoreBackup(file);
  };

  const settingSections = [
    {
      title: "Conta",
      items: [
        { icon: User, label: "Editar perfil", action: () => {} },
        { icon: Camera, label: "Alterar foto/avatar", action: () => {} },
        { icon: Edit3, label: "Alterar nome", action: () => {} },
        { icon: Mail, label: "Alterar e-mail", action: () => {} },
        { icon: Lock, label: "Alterar senha", action: () => {} },
      ]
    },
    {
      title: "Experiencia",
      items: [
        { icon: MoonIcon, label: "Modo Escuro", toggle: true, value: settings.darkMode, onToggle: () => setSettings((s) => ({ ...s, darkMode: !s.darkMode })) },
        { icon: Sparkles, label: "Animacoes", toggle: true, value: settings.animations, onToggle: () => setSettings((s) => ({ ...s, animations: !s.animations })) },
        { icon: Volume2, label: "Sons do aplicativo", toggle: true, value: settings.sound, onToggle: () => setSettings((s) => ({ ...s, sound: !s.sound })) },
        { icon: Smartphone, label: "Vibracao ao concluir", toggle: true, value: settings.vibration, onToggle: () => setSettings((s) => ({ ...s, vibration: !s.vibration })) },
        { icon: BarChart2, label: "Mostrar barra de XP", toggle: true, value: settings.showXpBar, onToggle: () => setSettings((s) => ({ ...s, showXpBar: !s.showXpBar })) },
        { icon: TrendingUp, label: "Mostrar porcentagem", toggle: true, value: settings.showProgressPercent, onToggle: () => setSettings((s) => ({ ...s, showProgressPercent: !s.showProgressPercent })) },
      ]
    },
    {
      title: "Dra. Helena",
      items: [
        { icon: settings.coachMode === "voz" ? Mic : Type, label: `Modo: ${settings.coachMode === "voz" ? "Voz" : "Texto"}`, action: () => setSettings((s) => ({ ...s, coachMode: s.coachMode === "voz" ? "texto" : "voz" })) },
        { icon: MessageCircle, label: "Frequencia das mensagens", action: () => {} },
        { icon: Heart, label: "Mensagens motivacionais", toggle: true, value: settings.motivationalMessages, onToggle: () => setSettings((s) => ({ ...s, motivationalMessages: !s.motivationalMessages })) },
        { icon: HandHeart, label: "Saudacao ao abrir", toggle: true, value: settings.greetingOnOpen, onToggle: () => setSettings((s) => ({ ...s, greetingOnOpen: !s.greetingOnOpen })) },
        { icon: Brain, label: `Personalidade: ${settings.coachPersonality}`, action: () => {
          const personalities = ["serious", "motivator", "balanced"];
          const current = personalities.indexOf(settings.coachPersonality);
          const next = personalities[(current + 1) % personalities.length];
          setSettings((s) => ({ ...s, coachPersonality: next }));
        }},
      ]
    },
    {
      title: "Notificacoes",
      items: [
        { icon: Droplet, label: "Lembrete de agua", toggle: true, value: settings.notifications.water, onToggle: () => setSettings((s) => ({ ...s, notifications: { ...s.notifications, water: !s.notifications.water } })) },
        { icon: Dumbbell, label: "Lembrete de treino", toggle: true, value: settings.notifications.workout, onToggle: () => setSettings((s) => ({ ...s, notifications: { ...s.notifications, workout: !s.notifications.workout } })) },
