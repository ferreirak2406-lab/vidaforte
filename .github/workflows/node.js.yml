          </div>
          <div className="pt-4 w-full"><BigButton label="Pronto para evoluir" onClick={next} /></div>
        </div>
      )}
    </div>
  );
}

// ---------- ABERTURA DIARIA ----------

function DailyOpening({ onDone }) {
  const { user, habits, streak, levelInfo, settings } = useApp();
  const [phase, setPhase] = useState(0);
  const [philLine, setPhilLine]
  const [philLine, setPhilLine] = useState(0);
  const [coachLine, setCoachLine] = useState(-1);
  const philosophy = ["Disciplina.", "Constancia.", "Evolucao."];

  const coachLines = ProgressService.generateCoachMessage(
    habits, user, streak, levelInfo.level
  );

  useEffect(() => {
    if (phase === 0) {
      const t = setTimeout(() => setPhase(1), 1900);
      return () => clearTimeout(t);
    }
  }, [phase]);

  useEffect(() => {
    if (phase !== 1) return;
    if (philLine >= philosophy.length) {
      const t = setTimeout(() => setPhase(2), 500);
      return () => clearTimeout(t);
    }
    const t = setTimeout(() => setPhilLine((l) => l + 1), 750);
    return () => clearTimeout(t);
  }, [phase, philLine]);

  useEffect(() => {
    if (phase !== 2) return;
    const timers = coachLines.map((_, i) => setTimeout(() => setCoachLine(i), 500 + i * 1000));
    return () => timers.forEach(clearTimeout);
  }, [phase, coachLines.length]);

  return (
    <div className="flex-1 flex flex-col">
      {phase === 0 && (
        <div className="flex-1 flex flex-col items-center justify-center relative">
          <div className="absolute w-64 h-64 rounded-full animate-pulse"
            style={{ background: `radial-gradient(circle, ${GREEN}55 0%, transparent 70%)` }} />
          <div className="relative"><VLogo size={72} /></div>
          <p className="relative text-white font-extrabold tracking-[0.2em] text-lg mt-5">
            VIDA <span style={{ color: GREEN }}>FORTE</span>
          </p>
          <p className="relative text-[12px] tracking-widest mt-2" style={{ color: MUTED }}>
            SUA EVOLUCAO COMECA AGORA.
          </p>
        </div>
      )}

      {phase === 1 && (
        <div className="flex-1 flex flex-col items-center justify-center px-10">
          <div className="flex flex-col items-center gap-3 min-h-[140px] justify-center">
            {philosophy.slice(0, philLine).map((l, i) => (
              <p key={i} className="text-xl font-bold tracking-wide" style={{ color: `${GREEN}55` }}>{l}</p>
            ))}
            {philLine < philosophy.length && (
              <p className="text-white text-2xl font-extrabold tracking-wide">{philosophy[philLine]}</p>
            )}
          </div>
        </div>
      )}

      {phase === 2 && (
        <div className="flex-1 flex flex-col justify-center px-6">
          <div className="flex items-center gap-2.5 mb-6">
            <div className="w-11 h-11 rounded-full flex items-center justify-center shrink-0" style={{ background: CARD, border: `1px solid ${GREEN}66` }}>
              {settings.coachMode === "voz" ? <Mic size={18} color={GREEN} /> : <Type size={18} color={GREEN} />}
            </div>
            <div>
              <p className="text-[12px] font-semibold" style={{ color: GREEN }}>Dra. Helena</p>
              <p className="text-[11px]" style={{ color: MUTED }}>{settings.coachMode === "voz" ? "falando agora" : "mensagem de texto"}</p>
            </div>
            {settings.coachMode === "voz" && (
              <div className="ml-auto flex items-end gap-[3px] h-5">
                {[6, 12, 8, 16, 10].map((h, i) => (
                  <span key={i} className="w-[3px] rounded-full animate-pulse" style={{ height: h, background: GREEN, animationDelay: `${i * 0.12}s` }} />
                ))}
              </div>
            )}
          </div>
          <div className="flex flex-col gap-4">
            {coachLines.map((l, i) => {
              const visible = i <= coachLine;
              return (
                <p key={i} className="text-[15px] leading-snug flex items-center gap-2 transition-all duration-500"
                  style={{ color: "#D7E5DC", opacity: visible ? 1 : 0, transform: visible ? "translateY(0)" : "translateY(6px)" }}>
                  {l}
                </p>
              );
            })}
          </div>
          <button onClick={onDone} disabled={coachLine < coachLines.length - 1}
            className="mt-10 w-full py-3.5 rounded-xl font-bold text-[14px] flex items-center justify-center gap-2 transition-opacity"
            style={{ background: `linear-gradient(90deg,${GREEN},#22C55E)`, color: "#04140A", opacity: coachLine < coachLines.length - 1 ? 0.35 : 1 }}>
            Sim, vamos continuar <ArrowRight size={16} />
          </button>
        </div>
      )}
    </div>
  );
}

