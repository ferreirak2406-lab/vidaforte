// ---------- MAPA DE EVOLUCAO ----------

function LevelMapScreen({ onBack }) {
  const { levelInfo, levelName, xp } = useApp();
  const currentIndex = LEVEL_MAP.findIndex((l) => l.name === levelName.name);

  return (
    <div className="flex-1 flex flex-col">
      <div className="flex items-center gap-3 px-5 pt-5 pb-3">
        <button onClick={onBack}><ArrowLeft size={18} color={MUTED} /></button>
        <p className="text-white font-bold text-[15px]">Mapa de Evolucao</p>
      </div>
      <div className="flex-1 overflow-y-auto px-5 pb-4">
        <Card className="mb-4 text-center">
          <p className="text-[12px]" style={{ color: MUTED }}>Nivel Atual</p>
          <p className="text-white text-3xl font-extrabold mt-1">{levelInfo.level}</p>
          <p className="text-[14px] font-semibold mt-1" style={{ color: levelName.color }}>{levelName.label}</p>
          <p className="text-[11px] mt-1" style={{ color: MUTED }}>{xp.toLocaleString()} XP total</p>
        </Card>

        <div className="flex flex-col gap-3">
          {LEVEL_MAP.map((l, i) => {
            const isActive = i <= currentIndex;
            const isCurrent = i === currentIndex;
            const isNext = i === currentIndex + 1;
            return (
              <Card key={l.name} className="flex items-center gap-4" 
                style={{ 
                  borderColor: isCurrent ? l.color : BORDER,
                  background: isCurrent ? `${l.color}0F` : CARD,
                  opacity: isActive ? 1 : 0.5,
                }}>
                <div className="w-12 h-12 rounded-full flex items-center justify-center text-lg font-bold border-2"
                  style={{
                    background: isActive ? l.color : CARD,
                    borderColor: l.color,
                    color: isActive ? "#04140A" : DIM,
                    boxShadow: isCurrent ? `0 0 16px ${l.color}44` : "none",
                  }}>
                  {i + 1}
                </div>
                <div className="flex-1">
                  <p className="text-[15px] font-bold" style={{ color: isActive ? l.color : DIM }}>{l.label}</p>
                  <p className="text-[11px]" style={{ color: MUTED }}>{l.minXp.toLocaleString()} XP</p>
                </div>
                {isCurrent && <Sparkles size={20} color={l.color} />}
                {isNext && <ChevronRight size={20} color={DIM} />}
              </Card>
            );
          })}
        </div>

        <Card className="mt-4">
          <p className="text-[12px] font-semibold mb-2" style={{ color: GREEN }}>PROXIMO NIVEL</p>
          <p className="text-white text-[14px]">
            Faltam {(levelInfo.target - levelInfo.current).toLocaleString()} XP para o nivel {levelInfo.level + 1}
          </p>
          <ProgressBar value={levelInfo.current} max={levelInfo.target} height={8} className="mt-2" />
        </Card>
      </div>
    </div>
  );
}

