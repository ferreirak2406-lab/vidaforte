function HabitosScreen() {
  const { habits, toggleHabit } = useApp();
  const [filter, setFilter] = useState("hoje");
  const doneCount = habits.filter((h) => h.done).length;

  const getIcon = (iconName) => {
    const icons = { Droplet, Dumbbell, Utensils, BookOpen, Moon, Brain };
    return icons[iconName] || Check;
  };

  return (
    <div className="flex-1 overflow-y-auto px-5 pt-5 pb-4">
      <Card className="flex items-center gap-4 mb-4">
        <div className="relative w-14 h-14 flex items-center justify-center shrink-0">
          <svg width="56" height="56" className="-rotate-90 absolute">
            <circle cx="28" cy="28" r="24" stroke={BORDER} strokeWidth="5" fill="none" />
            <circle cx="28" cy="28" r="24" stroke={GREEN} strokeWidth="5" fill="none" strokeLinecap="round"
              strokeDasharray={2 * Math.PI * 24} strokeDashoffset={2 * Math.PI * 24 * (1 - doneCount / habits.length)} />
          </svg>
          <span className="text-[13px] font-extrabold text-white">{doneCount}/{habits.length}</span>
        </div>
        <div>
          <p className="text-white text-[13px] font-semibold">
            {doneCount === habits.length ? "Dia perfeito. Sua constancia esta solida." : "Falta pouco para fechar o dia com evolucao."}
          </p>
          <p className="text-[11px] mt-0.5" style={{ color: MUTED }}>A Dra. Helena esta acompanhando seu ritmo</p>
        </div>
      </Card>

      <div className="flex rounded-full p-1 mb-4" style={{ background: CARD, border: `1px solid ${BORDER}` }}>
        {[{ id: "hoje", l: "Hoje" }, { id: "semana", l: "Semana" }, { id: "todos", l: "Todos" }].map((f) => (
          <button key={f.id} onClick={() => setFilter(f.id)} className="flex-1 py-1.5 rounded-full text-[12px] font-medium transition-colors"
            style={{ background: filter === f.id ? GREEN : "transparent", color: filter === f.id ? "#04140A" : MUTED }}>
            {f.l}
          </button>
        ))}
      </div>

      {habits.map((h) => {
        const Icon = getIcon(h.icon);
        return (
          <Card key={h.id} className="mb-3">
            <div className="flex items-center gap-3 mb-3">
              <button onClick={() => toggleHabit(h.id)} className="w-10 h-10 rounded-xl flex items-center justify-center shrink-0"
                style={{ background: h.done ? GREEN : "#131A15" }}>
                <Icon size={17} color={h.done ? "#04140A" : DIM} />
              </button>
              <div className="flex-1">
                <p className="text-white text-[14px] font-semibold">{h.label}</p>
                <p className="text-[11px]" style={{ color: MUTED }}>{h.meta}</p>
              </div>
              <div className="text-right">
                <div className="flex items-center gap-1 justify-end">
                  <Flame size={12} color={GREEN} />
                  <span className="text-[12px] text-white font-semibold">{h.streak || 0}</span>
                </div>
                <span className="text-[10px]" style={{ color: DIM }}>dias seguidos</span>
