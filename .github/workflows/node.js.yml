                    {active && <Check size={11} color="#04140A" strokeWidth={3} />}
                  </div>
                </button>
              );
            })}
          </div>
          <div className="pt-4"><BigButton onClick={next} disabled={!goal} /></div>
        </div>
      )}

      {step === 3 && (
        <div className="flex-1 flex flex-col px-7">
          <p className="text-white text-lg font-bold mb-1 mt-2">Crie seu avatar de evolucao</p>
          <p className="text-[12px] mb-5" style={{ color: MUTED }}>
            Envie uma foto sua. Ele evolui junto com voce — sempre voce, nunca um desenho.
          </p>
          <div className="flex-1 flex flex-col items-center justify-center">
            <button onClick={() => setUploaded(true)} className="relative w-40 h-40 rounded-full flex items-center justify-center border-2 mb-5"
              style={{ borderColor: GREEN, borderStyle: uploaded ? "solid" : "dashed", background: "linear-gradient(160deg,#1a2a20,#0a100c)" }}>
