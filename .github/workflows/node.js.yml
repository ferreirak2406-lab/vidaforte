// ---------- LOGIN / CADASTRO ----------

function AuthScreen({ onLogin, onRegister }) {
  const [mode, setMode] = useState("login");
  const [showPassword, setShowPassword] = useState(false);
  const [form, setForm] = useState({
    name: "", email: "", password: "", age: "", gender: "", height: "", weight: "", goal: "", avatar: null,
  });
  const [errors, setErrors] = useState({});
  const { showToast } = useApp();

  const validate = () => {
    const errs = {};
    if (!form.email.includes("@")) errs.email = "E-mail invalido";
    if (form.password.length < 6) errs.password = "Minimo 6 caracteres";
    if (mode === "register") {
      if (!form.name.trim()) errs.name = "Nome obrigatorio";
      if (!form.age || form.age < 10 || form.age > 120) errs.age = "Idade invalida";
      if (!form.gender) errs.gender = "Selecione o sexo";
    }
    setErrors(errs);
    return Object.keys(errs).length === 0;
  };

  const handleSubmit = () => {
    if (!validate()) return;
    if (mode === "login") {
      onLogin({ email: form.email });
    } else {
      onRegister({
        name: form.name, email: form.email, age: parseInt(form.age), gender: form.gender,
        height: form.height ? parseFloat(form.height) : null,
        weight: form.weight ? parseFloat(form.weight) : null,
        goal: form.goal, avatar: form.avatar, registeredAt: new Date().toISOString(),
      });
    }
  };

  const handleAvatarUpload = (e) => {
    const file = e.target.files?.[0];
    if (file) {
      if (file.size > 2 * 1024 * 1024) {
        showToast("Imagem muito grande. Max: 2MB", "error");
        return;
      }
      const reader = new FileReader();
      reader.onload = (ev) => setForm((f) => ({ ...f, avatar: ev.target.result }));
      reader.readAsDataURL(file);
    }
  };

  return (
    <div className="flex-1 flex flex-col px-6 overflow-y-auto">
      <div className="flex-1 flex flex-col items-center justify-center text-center pt-8">
        <VLogo size={64} />
        <p className="text-white text-2xl font-extrabold mt-5 mb-2">
          {mode === "login" ? "Bem-vindo de volta" : "Crie sua conta"}
        </p>
        <p className="text-[12px]" style={{ color: MUTED }}>
          {mode === "login" ? "Entre para continuar sua evolucao" : "Comece sua jornada Vida Forte"}
        </p>
      </div>

      <div className="flex flex-col gap-3 pb-6">
        {mode === "register" && (
          <>
            <div className="flex flex-col items-center mb-2">
              <label className="relative w-24 h-24 rounded-full flex items-center justify-center border-2 cursor-pointer overflow-hidden"
                style={{ borderColor: GREEN, borderStyle: form.avatar ? "solid" : "dashed", background: "linear-gradient(160deg,#1a2a20,#0a100c)" }}>
                <input type="file" accept="image/*" onChange={handleAvatarUpload} className="hidden" />
                {form.avatar ? (
                  <img src={form.avatar} alt="Avatar" className="w-full h-full object-cover" />
                ) : (
                  <Camera size={28} color={DIM} />
                )}
              </label>
              <p className="text-[11px] mt-1" style={{ color: MUTED }}>{form.avatar ? "Foto carregada" : "Toque para adicionar foto"}</p>
            </div>

            <input value={form.name} onChange={(e) => setForm((f) => ({ ...f, name: e.target.value }))}
              placeholder="Nome completo" className="w-full rounded-xl px-4 py-3 text-[13px] text-white outline-none"
              style={{ background: CARD, border: `1px solid ${errors.name ? ERROR : BORDER}` }} />
            {errors.name && <p className="text-[11px]" style={{ color: ERROR }}>{errors.name}</p>}

            <div className="flex gap-2">
              <select value={form.gender} onChange={(e) => setForm((f) => ({ ...f, gender: e.target.value }))}
                className="flex-1 rounded-xl px-4 py-3 text-[13px] text-white outline-none appearance-none"
                style={{ background: CARD, border: `1px solid ${errors.gender ? ERROR : BORDER}` }}>
                <option value="" style={{ background: CARD }}>Sexo</option>
                <option value="male" style={{ background: CARD }}>Masculino</option>
                <option value="female" style={{ background: CARD }}>Feminino</option>
                <option value="other" style={{ background: CARD }}>Outro</option>
              </select>
              <input value={form.age} onChange={(e) => setForm((f) => ({ ...f, age: e.target.value }))}
                type="number" placeholder="Idade" className="w-24 rounded-xl px-4 py-3 text-[13px] text-white outline-none"
                style={{ background: CARD, border: `1px solid ${errors.age ? ERROR : BORDER}` }} />
            </div>
            {(errors.gender || errors.age) && <p className="text-[11px]" style={{ color: ERROR }}>{errors.gender || errors.age}</p>}

            <div className="flex gap-2">
              <input value={form.height} onChange={(e) => setForm((f) => ({ ...f, height: e.target.value }))}
                type="number" placeholder="Altura (cm)" className="flex-1 rounded-xl px-4 py-3 text-[13px] text-white outline-none"
                style={{ background: CARD, border: `1px solid ${BORDER}` }} />
              <input value={form.weight} onChange={(e) => setForm((f) => ({ ...f, weight: e.target.value }))}
                type="number" placeholder="Peso (kg)" className="flex-1 rounded-xl px-4 py-3 text-[13px] text-white outline-none"
                style={{ background: CARD, border: `1px solid ${BORDER}` }} />
            </div>

