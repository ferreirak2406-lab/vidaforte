          <div className="flex-1 grid grid-cols-1 gap-2.5">
            {GOALS.map((g) => {
              const active = goal === g.id;
              return (
                <button key={g.id} onClick={() => setGoal(g.id)} className="flex items-center justify-between p-4 rounded-2xl border text-left"
                  style={{ borderColor: active ? GREEN : BORDER, background: active ? `${GREEN}0F` : CARD }}>
                  <div>
                    <p className="text-white text-[14px] font-semibold">{g.label}</p>
                    <p className="text-[11.5px]" style={{ color: MUTED }}>{g.desc}</p>
