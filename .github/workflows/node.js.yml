// ---------- APP ROOT ----------

export default function VidaForteAppCompleto() {
  const [stage, setStage] = useState("auth"); // auth | onboarding | opening | app
  const [screen, setScreen] = useState("home");
  const [prevScreen, setPrevScreen] = useState(null);

  const navigateTo = (newScreen) => {
    setPrevScreen(screen);
    setScreen(newScreen);
  };

  const goBack = () => {
    if (prevScreen) {
      setScreen(prevScreen);
      setPrevScreen(null);
    } else {
      setScreen("home");
    }
  };

  const showNav = ["home", "habitos", "estatisticas", "comunidade", "perfil"].includes(screen);

  return (
    <AppProvider>
      <AppContent 
        stage={stage} 
        setStage={setStage}
        screen={screen}
        setScreen={navigateTo}
        goBack={goBack}
        showNav={showNav}
      />
    </AppProvider>
  );
}

function AppContent({ stage, setStage, screen, setScreen, goBack, showNav }) {
  const { user, settings, t } = useApp();

  const handleLogin = (data) => {
    // Simula login
    setStage("app");
  };

  const handleRegister = (data) => {
    // Simula cadastro
    setStage("app");
  };

  return (
    <div className="min-h-screen w-full flex items-center justify-center p-4 md:p-8" style={{ background: BG }}>
      <div className="w-full max-w-[380px] h-[800px] rounded-[2.25rem] border-[6px] overflow-hidden flex flex-col relative"
        style={{ background: "black", borderColor: CARD }}>

        {stage === "auth" && (
          <AuthScreen onLogin={handleLogin} onRegister={handleRegister} />
        )}

        {stage === "onboarding" && (
          <Onboarding onFinish={() => setStage("opening")} />
        )}

        {stage === "opening" && (
          <DailyOpening onDone={() => setStage("app")} />
        )}

        {stage === "app" && (
          <>
            {screen === "home" && (
              <HomeScreen 
                onOpenChat={() => setScreen("chat")} 
                onOpenAlimentacao={() => setScreen("alimentacao")}
                onOpenLevelMap={() => setScreen("levelmap")}
              />
            )}
            {screen === "habitos" && <HabitosScreen />}
            {screen === "estatisticas" && <EstatisticasScreen />}
            {screen === "comunidade" && <ComunidadeScreen />}
            {screen === "perfil" && (
              <PerfilScreen 
                onOpenSettings={() => setScreen("settings")}
                onOpenLevelMap={() => setScreen("levelmap")}
                onOpenPremium={() => setScreen("premium")}
              />
            )}
            {screen === "alimentacao" && <AlimentacaoScreen onBack={goBack} />}
            {screen === "premium" && <PremiumScreen onBack={goBack} />}
            {screen === "chat" && <ChatScreen onBack={goBack} onCall={() => setScreen("call")} />}
            {screen === "call" && <CallScreen onEnd={goBack} />}
            {screen === "settings" && (
              <SettingsScreen 
                onBack={goBack} 
                onOpenAbout={() => setScreen("about")}
                onOpenManifesto={() => setScreen("manifesto")}
              />
            )}
            {screen === "about" && <AboutScreen onBack={goBack} />}
            {screen === "manifesto" && <ManifestoScreen onBack={goBack} />}
            {screen === "levelmap" && <LevelMapScreen onBack={goBack} />}

            {showNav && (
              <div className="border-t flex px-2 shrink-0" style={{ borderColor: BORDER, background: "black" }}>
                <NavItem icon={Home} label="Inicio" active={screen === "home"} onClick={() => setScreen("home")} />
                <NavItem icon={ListChecks} label="Habitos" active={screen === "habitos"} onClick={() => setScreen("habitos")} />
                <NavItem icon={BarChart3} label="Stats" active={screen === "estatisticas"} onClick={() => setScreen("estatisticas")} />
                <NavItem icon={Users} label="Comunidade" active={screen === "comunidade"} onClick={() => setScreen("comunidade")} />
                <NavItem icon={User} label="Perfil" active={screen === "perfil"} onClick={() => setScreen("perfil")} />
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}
