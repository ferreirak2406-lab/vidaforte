        { icon: Volume2, label: "Volume dos efeitos", action: () => {} },
        { icon: MoonIcon, label: "Musica relaxante Modo Foco", toggle: true, value: settings.focusMusic, onToggle: () => setSettings((s) => ({ ...s, focusMusic: !s.focusMusic })) },
      ]
    },
    {
      title: "Privacidade",
      items: [
        { icon: Fingerprint, label: "Bloqueio por biometria", toggle: true, value: settings.biometricLock, onToggle: () => setSettings((s) => ({ ...s, biometricLock: !s.biometricLock })) },
        { icon: KeyRound, label: "Bloqueio por PIN", toggle: true, value: settings.pinLock, onToggle: () => {
          if (settings.pinLock) {
            setSettings((s) => ({ ...s, pinLock: false, pin: null }));
          } else {
            setShowPinSetup(true);
          }
        }},
        { icon: Download, label: "Exportar dados", action: createBackup },
        { icon: Trash2, label: "Excluir conta", action: () => setShowDeleteConfirm(true), danger: true },
      ]
    },
    {
      title: "Backup",
      items: [
        { icon: Database, label: "Criar backup", action: createBackup },
        { icon: Upload, label: "Restaurar backup", action: () => fileInputRef.current?.click() },
        { icon: RotateCcw, label: "Backup automatico", toggle: true, value: settings.autoBackup, onToggle: () => setSettings((s) => ({ ...s, autoBackup: !s.autoBackup })) },
      ]
    },
    {
      title: "Idioma",
      items: [
        { icon: Languages, label: "Portugues", action: () => handleLanguageChange("pt"), active: settings.language === "pt" },
        { icon: Globe2, label: "English", action: () => handleLanguageChange("en"), active: settings.language === "en" },
        { icon: Globe, label: "Espanol", action: () => handleLanguageChange("es"), active: settings.language === "es" },
      ]
    },
    {
      title: "Vida Forte",
      items: [
        { icon: Info, label: "Sobre o aplicativo", action: onOpenAbout },
        { icon: FileText, label: `Versao ${APP_VERSION}`, action: () => {} },
        { icon: FileCheck, label: "Changelog (Novidades)", action: () => {} },
        { icon: Star, label: "Avaliar aplicativo", action: () => {} },
        { icon: Share2, label: "Compartilhar com amigos", action: () => {} },
        { icon: FileQuestion, label: "Termos de uso", action: () => {} },
        { icon: Shield, label: "Politica de privacidade", action: () => {} },
        { icon: HelpCircle, label: "Suporte", action: () => window.open(`mailto:${SUPPORT_EMAIL}`, "_blank") },
        { icon: Zap, label: "Manifesto Vida Forte", action: onOpenManifesto },
      ]
    },
  ];

  return (
    <div className="flex-1 flex flex-col">
      <div className="flex items-center gap-3 px-5 pt-5 pb-3">
        <button onClick={onBack}><ArrowLeft size={18} color={MUTED} /></button>
        <p className="text-white font-bold text-[15px]">Configuracoes</p>
      </div>
      <div className="flex-1 overflow-y-auto px-5 pb-4">
        {settingSections.map((section) => (
          <div key={section.title} className="mb-5">
            <p className="text-[11px] font-semibold tracking-wider mb-2 px-1" style={{ color: GREEN }}>{section.title.toUpperCase()}</p>
            <div className="flex flex-col gap-0.5">
              {section.items.map((item) => (
                <button key={item.label} onClick={item.action} className="flex items-center justify-between py-3 text-left"
                  style={{ color: item.danger ? ERROR : "#D7E5DC" }}>
                  <div className="flex items-center gap-3">
                    <item.icon size={16} color={item.danger ? ERROR : MUTED} />
                    <span className="text-[13px]">{item.label}</span>
                    {item.active && <Check size={12} color={GREEN} />}
                  </div>
                  {item.toggle !== undefined && (
                    <div className="w-10 h-5 rounded-full relative transition-colors" 
                      style={{ background: item.value ? GREEN : BORDER }}
                      onClick={(e) => { e.stopPropagation(); item.onToggle(); }}>
