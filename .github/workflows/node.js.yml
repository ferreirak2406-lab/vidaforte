function WeekTrack({ week }) {
  const labels = ["S", "T", "Q", "Q", "S", "S", "D"];
  return (
    <div className="flex gap-1">
      {week.map((v, i) => (
        <div key={i} className="flex flex-col items-center gap-0.5">
          <div className="w-4 h-4 rounded-[4px] flex items-center justify-center" style={{ background: v ? GREEN : BORDER }}>
            {v === 1 && <Check size={9} color="#04140A" strokeWidth={3} />}
          </div>
          <span className="text-[8px]" style={{ color: DIM }}>{labels[i]}</span>
