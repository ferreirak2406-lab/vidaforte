      </div>

      <input type="file" ref={fileInputRef} accept=".json" onChange={handleFileSelect} className="hidden" />

      <ConfirmDialog 
        isOpen={showDeleteConfirm}
        title="Excluir conta"
        message={t("deleteConfirm")}
        onConfirm={() => { deleteAccount(); setShowDeleteConfirm(false); }}
        onCancel={() => setShowDeleteConfirm(false)}
      />

      {showPinSetup && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: "rgba(0,0,0,0.8)" }}>
          <div className="rounded-2xl p-5 w-full max-w-sm" style={{ background: CARD, border: `1px solid ${BORDER}` }}>
            <p className="text-white text-[15px] font-bold mb-3">Configurar PIN</p>
            <p className="text-[12px] mb-4" style={{ color: MUTED }}>Digite 4 numeros para o PIN</p>
            <input type="password" maxLength={4} value={pin} onChange={(e) => setPin(e.target.value.replace(/\\D/g, ""))}
              className="w-full rounded-xl px-4 py-3 text-[18px] text-center text-white outline-none tracking-[0.5em] mb-4"
              style={{ background: CARD, border: `1px solid ${BORDER}` }} placeholder="****" />
            <div className="flex gap-2">
              <button onClick={() => { setShowPinSetup(false); setPin(""); }} className="flex-1 py-2.5 rounded-xl text-[13px]" style={{ background: BORDER, color: MUTED }}>Cancelar</button>
              <button onClick={handlePinSetup} disabled={pin.length !== 4} className="flex-1 py-2.5 rounded-xl text-[13px] font-bold"
                style={{ background: GREEN, color: "#04140A", opacity: pin.length === 4 ? 1 : 0.35 }}>Confirmar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

