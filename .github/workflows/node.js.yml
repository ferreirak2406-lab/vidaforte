            <button onClick={() => setLiked((p) => ({ ...p, [i]: !p[i] }))} className="flex items-center gap-1.5 text-[11.5px]" style={{ color: liked[i] ? GREEN : MUTED }}>
              <Heart size={13} fill={liked[i] ? GREEN : "none"} /> {f.likes + (liked[i] ? 1 : 0)}
            </button>
            <span className="flex items-center gap-1.5 text-[11.5px]" style={{ color: MUTED }}><MessageCircle size={13} /> {f.comments}</span>
          </div>
        </Card>
      ))}
    </div>
  );
}

