          <div className="flex-1 flex flex-col gap-2.5 overflow-y-auto">
            {PILLARS.map((p) => {
              const Icon = p.icon;
              return (
                <div key={p.title} className="flex items-start gap-3 rounded-2xl p-3.5" style={{ background: CARD, border: `1px solid ${BORDER}` }}>
